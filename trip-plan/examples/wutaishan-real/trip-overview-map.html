const tagLabels = {"start": "起点", "end": "终点", "attract": "景点", "hotel": "酒店", "food": "餐厅", "service": "服务区", "stop": "驿站"};

// ==================== 地图初始化 ====================
const map = L.map('map', {zoomControl: true}).setView([40.5, 116.5], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '© OpenStreetMap'
}).addTo(map);

const markerLayer = L.layerGroup().addTo(map);
const lineLayer = L.layerGroup().addTo(map);
const routeLayer = L.layerGroup().addTo(map);
const specialLayer = L.layerGroup().addTo(map);

let currentDay = 'all';
let currentMode = 'route';

function render() {
  markerLayer.clearLayers();
  lineLayer.clearLayers();
  routeLayer.clearLayers();
  specialLayer.clearLayers();

  const daysToShow = currentDay === 'all' ? Object.keys(days) : [currentDay];
  const allBounds = [];

  daysToShow.forEach(function(day) {
    const dayPois = pois.filter(function(p) { return p.day === day; });

    // 路径选择
    let pathLatLngs = null;
    if (currentMode === 'route' && dayRoutes[day] && dayRoutes[day].length >= 2) {
      pathLatLngs = dayRoutes[day].map(function(c) { return [c[1], c[0]]; });
    } else if (dayPois.length >= 2) {
      pathLatLngs = dayPois.map(function(p) { return [p.lat_wgs84, p.lng_wgs84]; });
    }

    if (pathLatLngs) {
      const layer = currentMode === 'route' ? routeLayer : lineLayer;
      L.polyline(pathLatLngs, {
        color: dayColors[day],
        weight: currentMode === 'route' ? 5 : 3,
        opacity: currentMode === 'route' ? 0.85 : 0.6,
        dashArray: currentMode === 'route' ? null : '6,6'
      }).addTo(layer);
    }

    // Markers
    dayPois.forEach(function(p) {
      const color = tagColors[p.tag] || '#666';
      const isFallback = p.coord_source && p.coord_source.indexOf('fallback') === 0;
      const icon = L.divIcon({
        className: '',
        html: '<div style="background:' + color + ';color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border:2px solid white;box-shadow:0 2px 4px rgba(0,0,0,.3)' + (isFallback ? ';opacity:0.5' : '') + '">' + p.idx + '</div>',
        iconSize: [28, 28],
        iconAnchor: [14, 14]
      });
      const marker = L.marker([p.lat_wgs84, p.lng_wgs84], {icon: icon, title: p.name}).addTo(markerLayer);

      // Popup 含高德导航
      const amapUrl = 'https://uri.amap.com/navigation?to=' + p.lng_gcj02 + ',' + p.lat_gcj02 + ',' + encodeURIComponent(p.name) + '&mode=car&src=wutaishan';
      const srcClass = p.coord_source ? p.coord_source.split(':')[0] : 'unknown';
      const popupHtml =
        '<b>' + p.idx + '. ' + p.name + '</b><br>' +
        '<span style="color:' + color + '">●</span> ' + tagLabels[p.tag] + ' · ' + p.day + '<br>' +
        '<small>' + p.info + '</small><br>' +
        '<small style="color:#888">📍 GCJ-02: ' + p.lng_gcj02 + ', ' + p.lat_gcj02 + '</small><br>' +
        '<small class="src-' + srcClass + '">来源: ' + (p.coord_source || '未知') + '</small><br>' +
        '<a href="' + amapUrl + '" target="_blank" style="color:#FF6F00">🧭 高德导航</a>';
      marker.bindPopup(popupHtml);
      allBounds.push([p.lat_wgs84, p.lng_wgs84]);
    });
  });

  // 特殊路线(如 99号公路)
  specialRoutes.forEach(function(route) {
    // 过滤:每条特殊路线有可选的 day 字段;不设则 'all' 才显示
    if (currentDay !== 'all' && route.day && currentDay !== route.day) return;
    if (!route.waypoints || route.waypoints.length < 2) return;
    const latlngs = route.waypoints.map(function(c) { return [c[1], c[0]]; });
    L.polyline(latlngs, {
      color: route.color || '#FF6F00',
      weight: route.weight || 6,
      opacity: 0.9
    }).addTo(specialLayer).bindPopup(route.label || '特殊路线');
  });

  if (allBounds.length > 0) map.fitBounds(allBounds, {padding: [50, 50]});
}

render();

// ==================== 图例 ====================
const legend = L.control({position: 'bottomright'});
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  let html = '<b>类别</b><br>';
  Object.keys(tagLabels).forEach(function(k) {
    html += '<span class="dot" style="background:' + tagColors[k] + '"></span>' + tagLabels[k] + '<br>';
  });
  html += '<br><b>Day 路线</b><br>';
  Object.keys(days).forEach(function(k) {
    html += '<span class="dot" style="background:' + dayColors[k] + '"></span>' + k + ': ' + days[k] + '<br>';
  });
  if (specialRoutes.length > 0) {
    html += '<br><b>特殊路线</b><br>';
    specialRoutes.forEach(function(r) {
      html += '<span class="dot" style="background:' + (r.color || '#FF6F00') + '"></span>' + (r.label || '?') + '<br>';
    });
  }
  html += '<br><span class="dot" style="background:#999;opacity:0.5"></span>半透明 = city 兜底';
  div.innerHTML = html;
  return div;
};
legend.addTo(map);

// ==================== 控件交互 ====================
document.querySelectorAll('#dayFilter button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#dayFilter button').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentDay = btn.dataset.day;
    render();
  });
});
document.querySelectorAll('#routeToggle button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#routeToggle button').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    render();
  });
});
</script>
</body>
</html>
